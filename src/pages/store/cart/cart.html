<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carrito</title>
  <!-- conecta el archivo de estilos CSS -->
  <link rel="stylesheet" href="../../../style.css">
</head>

<body class="store-page">

  <header class="store-header">

    <h1>Carrito</h1>

    <nav class="store-nav">
      <a href="/src/pages/store/home/home.html">
        Volver al catálogo
      </a>
    </nav>

  </header>                                  <!--Navegación al catálogo-->

  <!-- layout principal del carrito -->
  <div class="cart-layout">

    <!-- contenedor donde TypeScript renderiza productos dinámicamente -->
    <div id="cart-container"></div>

    <!-- panel lateral resumen -->
    <aside class="cart-summary">

      <h2>Resumen</h2>

      <!-- contenedor donde se muestra el total dinámicamente -->
      <div id="cart-total"></div>

      <!-- botón para vaciar el carrito -->
      <button id="clear-cart">
        Vaciar carrito
      </button>

    </aside>

  </div>

  <!-- ejecuta la lógica TypeScript del carrito -->
  <script type="module" src="./cart.ts"></script>
</body>
</html>
